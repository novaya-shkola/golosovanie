<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голосование: Игнатов Илья</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #2c3e50;
        }

        .card {
            background: #ffffff;
            width: 90%;
            max-width: 380px;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            text-align: center;
            border: 1px solid #e1e8ed;
        }

        .candidate-name {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 20px;
            color: #1a1a1a;
            letter-spacing: -0.5px;
        }

        .profile-pic {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #0088cc;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(0, 136, 204, 0.2);
        }

        .description {
            font-size: 16px;
            line-height: 1.6;
            color: #5f6368;
            margin-bottom: 30px;
        }

        .btn-tg {
            display: block;
            background-color: #0088cc;
            color: white;
            text-decoration: none;
            padding: 18px 20px;
            font-size: 17px;
            font-weight: bold;
            border-radius: 50px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0, 136, 204, 0.3);
        }

        .btn-tg:hover {
            background-color: #007bbd;
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(0, 136, 204, 0.4);
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #bdc3c7;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .footer span {
            color: #7f8c8d;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="candidate-name">Игнатов Илья</div>

        <img src="my-photo.jpg" alt="Игнатов Илья" class="profile-pic">
        
        <div class="description">
            Хотите оставить голос за кандидата?<br>
            <b>Переходите в нашего ТГ-Бота</b>
        </div>
        
        <a href="https://t.me/your_bot_username" class="btn-tg">Перейти в бота</a>
        
        <div class="footer">
            Организатор: <span>Axioma API</span>
        </div>
    </div>

</body>
</html>
