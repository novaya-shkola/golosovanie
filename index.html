<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голосование за кандидата</title>
    <style>
        body {
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #1c1e21;
        }

        .card {
            background: #ffffff;
            width: 90%;
            max-width: 400px;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        .profile-pic {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid #0088cc; /* Цвет Telegram */
            margin-bottom: 20px;
        }

        h2 {
            margin-bottom: 10px;
            font-size: 22px;
        }

        p {
            font-size: 16px;
            line-height: 1.5;
            color: #4b4f56;
            margin-bottom: 25px;
        }

        .btn-tg {
            display: inline-block;
            background-color: #0088cc;
            color: white;
            text-decoration: none;
            padding: 16px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px; /* Закругленный фрейм */
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3);
        }

        .btn-tg:hover {
            background-color: #0077b5;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 136, 204, 0.4);
        }

        .footer {
            margin-top: 30px;
            font-size: 13px;
            color: #90949c;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="my-photo.jpg" alt="Кандидат" class="profile-pic">
        
        <h2>Выбор кандидата</h2>
        <p>Хотите оставить голос за кандидата? <br> Переходите в нашего ТГ-Бота</p>
        
        <a href="https://t.me/your_bot_username" class="btn-tg">Перейти в бота</a>
        
        <div class="footer">
            Организатор: Axioma API
        </div>
    </div>

</body>
</html>
